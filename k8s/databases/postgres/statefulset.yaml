apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: postgres
  namespace: fullstack-platform

spec:
  serviceName: postgres-service

  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:

    metadata:
      labels:
        app: postgres

    spec:

      containers:

        - name: postgres

          image: postgres:16

          ports:
            - containerPort: 5432

          env:

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

          readinessProbe:

            exec:
              command:
                - pg_isready
                - -U
                - appuser

            initialDelaySeconds: 15
            periodSeconds: 10

          livenessProbe:

            exec:
              command:
                - pg_isready
                - -U
                - appuser

            initialDelaySeconds: 30
            periodSeconds: 20

  volumeClaimTemplates:

    - metadata:
        name: postgres-storage

      spec:

        accessModes:
          - ReadWriteOnce

        resources:

          requests:
            storage: 5Gi