apiVersion: networking.k8s.io/v1

kind: Ingress

metadata:
  name: frontend-ingress
  namespace: fullstack-platform

spec:

  ingressClassName: nginx

  rules:

  - host: app.local

    http:

      paths:

      - path: /

        pathType: Prefix

        backend:

          service:

            name: frontend-service

            port:

              number: 80