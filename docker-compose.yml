version: "3.9"

services:

  backend:
    build:
      context: ./backend
    container_name: backend

    env_file:
      - .env

    ports:
      - "8005:8000"

    depends_on:
      - postgres
      - mongodb
      - redis
      
    restart: unless-stopped
    volumes:
      # This binds your current local directory to the app directory in docker
      - ./backend:/app 
    working_dir: /app

  frontend:
    build:
      context: ./frontend

    container_name: frontend

    ports:
      - "3005:80"

    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      
    command: npm run dev -- --host 0.0.0.0

  celery-worker:
    build:
      context: ./backend

    command: celery -A app.tasks.celery_app worker --loglevel=info

    env_file:
      - .env

    depends_on:
      - redis
      - backend

  celery-beat:
    build:
      context: ./backend

    command: celery -A app.tasks.celery_app beat --loglevel=info

    env_file:
      - .env

    depends_on:
      - redis

  postgres:
    image: postgres:16

    container_name: postgres

    restart: always

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5435:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U appuser"
        ]

  mongodb:
    image: mongo:7

    container_name: mongodb

    restart: always

    ports:
      - "27015:27017"

    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7

    container_name: redis

    restart: always

    ports:
      - "6375:6379"

volumes:

  postgres_data:

  mongo_data:


