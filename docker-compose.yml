version: "3.9"

services:

  backend:
    build:
      context: ./backend
    container_name: backend

    env_file:
      - .env

    ports:
      - "8005:8000"

    depends_on:
      - postgres
      - mongodb
      - redis
      
    restart: unless-stopped
    volumes:
      # This binds your current local directory to the app directory in docker
      - ./backend:/app 
    working_dir: /app

  # frontend:
  #   build:
  #     context: ./frontend

  #   container_name: frontend

  #   ports:
  #     - "3005:80"

  #   depends_on:
  #     - backend
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
      
  #   command: npm run dev -- --host 0.0.0.0
  frontend-vite:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev

    container_name: frontend-vite

    volumes:
      - ./frontend:/app
      - /app/node_modules

    expose:
      - "5173"

    depends_on:
      - backend

  frontend:
    image: nginx:alpine

    container_name: frontend-nginx

    ports:
      - "3005:80"

    volumes:
      - ./frontend/nginx.dev.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - frontend-vite
      - backend
      - flower
      - grafana

  celery-worker:
    build:
      context: ./backend

    command: celery -A app.tasks.celery_app worker --loglevel=info

    env_file:
      - .env

    depends_on:
      - redis
      - backend

  celery-beat:
    build:
      context: ./backend

    command: celery -A app.tasks.celery_app beat --loglevel=info

    env_file:
      - .env

    depends_on:
      - redis

  flower:
    build:
      context: ./backend

    command: >
      celery
      -A app.tasks.celery_app
      flower
      --port=5555
      --url_prefix=flower

    ports:
      - "5555:5555"

    depends_on:
      - redis

  postgres:
    image: postgres:16

    container_name: postgres

    restart: always

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5435:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U appuser"
        ]

  mongodb:
    image: mongo:7

    container_name: mongodb

    restart: always

    ports:
      - "27015:27017"

    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7

    container_name: redis

    restart: always

    ports:
      - "6375:6379"

  grafana:
    image: grafana/grafana
    container_name: grafana

    restart: unless-stopped

    environment:
      GF_SERVER_ROOT_URL: http://localhost:3005/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"

    ports:
      - "3006:3000"

    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

volumes:

  postgres_data:

  mongo_data:


