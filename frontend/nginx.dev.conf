server {
    listen 80;

    #
    # Redirect URLs without trailing slash
    #
    location = /api {
        return 301 /api/;
    }

    location = /flower {
        return 301 /flower/;
    }

    location = /grafana {
        return 301 /grafana/;
    }

    location = /prometheus {
        return 301 /prometheus/;
    }

    #
    # FastAPI OpenAPI schema (must not strip /api prefix)
    #
    location = /api/openapi.json {
        proxy_pass http://backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    #
    # FastAPI API (strip /api/ prefix; backend routes live at /health, /users, etc.)
    #
    location ^~ /api/ {
        proxy_pass http://backend:8000/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    #
    # FastAPI Swagger (no URI in proxy_pass — preserves /docs/static/* asset paths)
    #
    location ^~ /docs {
        proxy_pass http://backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    #
    # FastAPI ReDoc
    #
    location ^~ /redoc {
        proxy_pass http://backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    #
    # Flower (served with --url_prefix=flower)
    #
    location ^~ /flower/ {
        proxy_pass http://flower:5555;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    #
    # Grafana
    #
    location ^~ /grafana/ {
        proxy_pass http://grafana:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    #
    # Prometheus
    #
    location ^~ /prometheus/ {
        proxy_pass http://prometheus:9090;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    #
    # React / Vite
    # Keep this LAST
    #
    location / {
        proxy_pass http://frontend-vite:5173;

        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
